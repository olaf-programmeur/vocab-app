<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Vocabulaire</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>

    <!-- ═════════════════════════════════════════════════════════
         TWEMOJI : remplace tous les emojis du DOM par des SVG colorés.
         Garantit un affichage identique sur tous les navigateurs et OS,
         indépendamment des polices installées.
         ═════════════════════════════════════════════════════════ -->
    <script src="https://cdn.jsdelivr.net/npm/@twemoji/api@latest/dist/twemoji.min.js" crossorigin="anonymous"></script>
    <script>
      (function () {
        const TWEMOJI_OPTS = {
          folder: 'svg',
          ext: '.svg',
          className: 'tw-emoji'
        };

        let timer = null;
        function scheduleParse() {
          clearTimeout(timer);
          timer = setTimeout(() => {
            if (window.twemoji) {
              window.twemoji.parse(document.body, TWEMOJI_OPTS);
            }
          }, 50);
        }

        function init() {
          scheduleParse();
          const obs = new MutationObserver(scheduleParse);
          obs.observe(document.body, {
            childList: true,
            subtree: true,
            characterData: true
          });
        }

        if (document.readyState === 'complete') {
          init();
        } else {
          window.addEventListener('load', init);
        }
      })();
    </script>
    <style>
      .tw-emoji {
        height: 1em;
        width: 1em;
        margin: 0 0.05em 0 0.1em;
        vertical-align: -0.1em;
        display: inline-block;
      }
    </style>
  </body>
</html>
